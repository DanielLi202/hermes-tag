name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # No third-party deps: the suite runs against local contract stubs when
      # hermes-agent is absent (the live-Hermes smoke test self-skips).
      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests
